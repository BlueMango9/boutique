<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Raaha Boutique — India's premier designer boutique for premium sarees, lehengas, sherwanis and more. Authentic handcrafted fashion since 2009.">
  <meta name="keywords" content="designer boutique, sarees, lehengas, sherwanis, Indian fashion, bridal wear, Hyderabad">
  <meta property="og:title" content="Raaha Boutique — Premium Designer Fashion">
  <meta property="og:description" content="Discover timeless Indian elegance. Premium sarees, bridal lehengas, sherwanis and designer wear crafted by master artisans.">
  <meta property="og:type" content="website">
  <title>Raaha Boutique — Premium Designer Fashion</title>

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/catalogue.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    /* Page top spacing for fixed navbar */
    #app > *:first-child:not(.hero):not(.auth-page) {
      padding-top: var(--nav-h);
    }
    /* Active nav link */
    .nav-link.active { color: var(--gold); }
    /* Smooth scroll fix */
    html { scroll-padding-top: var(--nav-h); }
  </style>
</head>
<body>

  <!-- Navbar injection point -->
  <div id="navbar-wrap"></div>

  <!-- Main SPA content -->
  <main id="app" role="main" aria-live="polite"></main>

  <!-- Footer injection point -->
  <div id="footer-wrap"></div>

  <!-- JS — order matters -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/pages2.js"></script>
  <script src="js/pages3.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
